name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Detekt
        run: ./gradlew detekt --no-daemon

  build:
    runs-on: ubuntu-latest
    needs: lint
    environment: debug
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Inject Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/google-services.json
          mkdir -p androidApp/src/debug
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/src/debug/google-services.json

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore androidApp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew assembleDebug --no-daemon

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Unit tests (JVM)
        run: ./gradlew testAndroidHostTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: "**/build/reports/tests/"

  deploy-debug:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    environment: debug
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Inject Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/google-services.json
          mkdir -p androidApp/src/debug
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/src/debug/google-services.json

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore androidApp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          groups: internal-testers

  coverage:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Kover coverage report
        run: ./gradlew koverHtmlReport koverXmlReport --no-daemon

      - name: Update coverage docs
        run: python3 scripts/update-coverage-docs.py

      - name: Commit coverage update
        run: |
          git diff --quiet docs/TESTING.md README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/TESTING.md README.md
          git commit -m "[coverage] update coverage data"
          git push

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: "build/reports/kover/"
