name: Pull Request

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ci:
              - '.github/**'

      - uses: rhysd/actionlint@v1.7.11
        if: steps.filter.outputs.ci == 'true'

  lint:
    needs: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Detekt
        run: ./gradlew detekt --no-daemon

  build:
    runs-on: ubuntu-latest
    needs: lint
    environment: debug
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Inject Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/google-services.json
          mkdir -p androidApp/src/debug
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/src/debug/google-services.json

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore androidApp/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew assembleDebug --no-daemon

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Unit tests (JVM)
        run: ./gradlew testAndroidHostTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: "**/build/reports/tests/"

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Kover coverage report
        run: ./gradlew koverHtmlReport --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: "build/reports/kover/"

  ios-simulator-build:
    runs-on: macos-14  # Apple Silicon — matches iosSimulatorArm64 target
    needs: actionlint

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Select Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16* 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Link Kotlin/Native debug framework (iosSimulatorArm64)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ hashFiles('iosApp/iosApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-

      - name: Inject placeholder GoogleService-Info.plist
        run: |
          cat > iosApp/iosApp/GoogleService-Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>        <string>placeholder</string>
            <key>GCM_SENDER_ID</key>  <string>000000000000</string>
            <key>PLIST_VERSION</key>   <string>1</string>
            <key>BUNDLE_ID</key>       <string>com.portfolio.nutrisport.NutriSport</string>
            <key>PROJECT_ID</key>      <string>placeholder</string>
            <key>GOOGLE_APP_ID</key>   <string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          PLIST

      - name: Build iOS app for simulator (no signing)
        env:
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED: "YES"
        run: |
          FRAMEWORK_DIR="$(pwd)/composeApp/build/bin/iosSimulatorArm64/debugFramework"
          mkdir -p "$RUNNER_TEMP/spm-cache"

          set -o pipefail
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -target iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            FRAMEWORK_SEARCH_PATHS="\$(inherited) ${FRAMEWORK_DIR}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | xcbeautify --quiet

      - name: Upload xcodebuild log
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: xcodebuild-log-${{ github.run_id }}
          path: ${{ runner.temp }}/xcodebuild.log
          retention-days: 7
