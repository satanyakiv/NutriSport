name: Pull Request

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - '.github/**'

      - uses: rhysd/actionlint@v1.7.11
        if: steps.filter.outputs.ci == 'true'

  lint:
    needs: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup

      - name: Detekt
        run: ./gradlew detekt --no-daemon

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup

      - name: Build
        run: ./gradlew assembleDebug --no-daemon

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup

      - name: Unit tests (JVM)
        run: ./gradlew testAndroidHostTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/reports/tests/"

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup

      - name: Kover coverage report
        run: ./gradlew koverHtmlReport --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "build/reports/kover/"

  ios-check:
    runs-on: macos-14  # Apple Silicon — швидший Kotlin/Native compile
    needs: actionlint

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup

      # Перевіряємо що Kotlin/Native компілюється для iOS (без лінковки framework — швидше)
      # Ловить 90% проблем: актуальні actual/expect, iOS-specific код, залежності
      - name: Compile Kotlin/Native (iOS)
        run: ./gradlew :composeApp:compileIosMainKotlinMetadata --no-daemon
