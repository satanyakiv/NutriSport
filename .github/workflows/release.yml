name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Inject Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/google-services.json
          mkdir -p androidApp/src/release
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > androidApp/src/release/google-services.json

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          ./gradlew assembleRelease \
            -Papp.versionName="$VERSION_NAME" \
            -Papp.versionCode="${{ github.run_number }}" \
            --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: release-apk
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: androidApp/build/outputs/apk/release/androidApp-release.apk
          groups: internal-testers
          releaseNotes: "Release ${{ github.ref_name }}"
